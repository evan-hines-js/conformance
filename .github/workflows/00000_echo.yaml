# conformance/00000_echo.yaml
#
# Rung 0 — the go/no-go. The simplest possible workflow, but running it exercises the
# ENTIRE runner wire-protocol round-trip:
#
#   register runner -> poll message queue -> receive job message -> run one shell step
#   -> stream timeline records + logs -> report completion
#
# If a stock, UNMODIFIED `actions/runner` can run this against the Brokkr (Elixir) broker,
# the protocol is tractable and the project is real. If it can't, nothing else matters.
#
# This is a valid GitHub Actions workflow: it runs identically on real GitHub, so it
# doubles as the first differential-test case (GitHub is the oracle; Brokkr must match).
#
# Pass criteria:
#   - run conclusion        == success
#   - job "echo" conclusion == success
#   - step "Say hello" conclusion == success, log contains "hello, brokkr"
#   - timeline progressed: queued -> running -> completed
#
# Deliberately NO `uses:` — no action download, so this stays pure protocol, not
# action-runtime behavior. That comes in later rungs (checkout, etc.).

name: echo

on: push

jobs:
  echo:
    runs-on: ubuntu-latest
    steps:
      - name: Say hello
        run: echo "hello, brokkr"
