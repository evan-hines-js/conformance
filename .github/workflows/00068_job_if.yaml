name: job-if

on: push

jobs:
  gate:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/')
    outputs:
      flag: ${{ steps.set.outputs.flag }}
    steps:
      - name: Set flag
        id: set
        run: echo "flag=on" >> "$GITHUB_OUTPUT"

  tag-only:
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag' || contains(github.ref, 'release')
    steps:
      - name: Tag only
        run: echo "should-not-run"

  downstream:
    runs-on: ubuntu-latest
    needs: tag-only
    steps:
      - name: Downstream
        run: echo "should-not-run-either"

  flagged:
    runs-on: ubuntu-latest
    needs: gate
    if: needs.gate.outputs.flag == 'on'
    steps:
      - name: Flagged
        run: echo "flag-propagated"

  wrap-up:
    runs-on: ubuntu-latest
    needs: [flagged, downstream]
    if: always()
    steps:
      - name: Wrap up
        run: echo "wrapped-up downstream=${{ needs.downstream.result }}"
