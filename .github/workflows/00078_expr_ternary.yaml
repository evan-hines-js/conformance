name: expr-ternary

on: push

jobs:
  job:
    runs-on: ubuntu-latest
    steps:
      - name: Pick environment
        run: echo "target=${{ github.ref_name == 'main' && 'production' || 'staging' }}"
      - name: Pick from non-default
        run: echo "target=${{ github.ref_name == 'develop' && 'production' || 'staging' }}"
