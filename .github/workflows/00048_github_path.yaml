name: github-path

on: push

jobs:
  job:
    runs-on: ubuntu-latest
    steps:
      - name: Install tool
        run: |
          mkdir -p "$HOME/.local/bin"
          printf '#!/usr/bin/env bash\necho hello-from-path-tool\n' > "$HOME/.local/bin/brokkrtool"
          chmod +x "$HOME/.local/bin/brokkrtool"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Use tool
        run: brokkrtool
