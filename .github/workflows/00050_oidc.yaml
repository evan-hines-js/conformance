name: oidc

on: push

permissions:
  id-token: write

jobs:
  job:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch id-token
        run: |
          resp=$(curl -fsS "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=brokkr-test" \
                 -H "Authorization: Bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}")
          jwt=$(echo "$resp" | jq -r .value)
          payload=$(echo "$jwt" | cut -d. -f2 | tr '_-' '/+')
          pad=$(( (4 - ${#payload} % 4) % 4 )); payload="$payload$(printf '=%.0s' $(seq 1 "$pad"))"
          echo "claims=$(echo "$payload" | base64 -d)"
