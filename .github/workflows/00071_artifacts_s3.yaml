name: artifacts-s3

on: push

jobs:
  producer:
    runs-on: ubuntu-latest
    steps:
      - name: Make file
        run: echo "hello-artifact-content" > out.txt
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: my-artifact
          path: out.txt
  consumer:
    needs: producer
    runs-on: ubuntu-latest
    steps:
      - name: Download
        uses: actions/download-artifact@v4
        with:
          name: my-artifact
      - name: Read
        run: cat out.txt
