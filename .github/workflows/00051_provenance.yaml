name: provenance

on: push

# id-token: write so the runner exposes ACTIONS_ID_TOKEN_REQUEST_URL — we only use it to derive the
# broker's base URL (the attestations API lives next to /oidc/token); auth is the AccessToken.
permissions:
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Build
        run: |
          echo "artifact-contents" > artifact.txt
          sha=$(sha256sum artifact.txt | cut -d' ' -f1)
          base="${ACTIONS_ID_TOKEN_REQUEST_URL%%/oidc/token*}"
          # The GHA way: the build opts in to provenance by POSTing the subjects it produced to the
          # attestations API, authenticated by its AccessToken (ACTIONS_RUNTIME_TOKEN). The broker
          # signs the SLSA statement server-side and stores it.
          curl -fsS -X POST "${base}/repos/octo/demo/attestations" \
            -H "Authorization: Bearer ${ACTIONS_RUNTIME_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"subjects\":[{\"name\":\"artifact.txt\",\"sha256\":\"$sha\"}]}"
