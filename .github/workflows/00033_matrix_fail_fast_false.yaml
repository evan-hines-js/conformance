name: matrix-fail-fast-false

on: push

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        variant: [ok, boom]
    steps:
      - name: Run
        run: |
          if [ "${{ matrix.variant }}" = "boom" ]; then
            echo "failing variant"
            exit 1
          fi
          echo "ok variant"
