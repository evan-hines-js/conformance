name: attest-spike

on: push

permissions:
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Attest + verify + adversarial (hardened proof)
        run: |
          set +e
          echo "hello-spike" > artifact.txt
          base="${ACTIONS_ID_TOKEN_REQUEST_URL%%/oidc/token*}"
          arch=$(uname -m); case "$arch" in x86_64) ca=amd64;; aarch64|arm64) ca=arm64;; *) ca=amd64;; esac
          curl -fsSL -o cosign "https://github.com/sigstore/cosign/releases/download/v2.4.3/cosign-linux-${ca}" && chmod +x cosign
          tok=$(curl -fsS "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=sigstore" \
                  -H "Authorization: Bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" | jq -r .value)
          echo '{"buildType":"https://brokkr.dev/buildtypes/workflow/v1","builder":{"id":"brokkr"}}' > pred.json
          curl -fsS "$base/api/v1/trustedroot" -o trustedroot.json
          identity="$base/octo/demo"

          echo "=== SIGN (cosign keyless against our Fulcio) ==="
          COSIGN_EXPERIMENTAL=1 ./cosign attest-blob --yes \
            --fulcio-url "$base" --oidc-issuer "$base" --identity-token "$tok" \
            --insecure-skip-verify --tlog-upload=false --new-bundle-format \
            --predicate pred.json --type slsaprovenance \
            --bundle out.bundle artifact.txt || { echo "SIGN FAILED"; exit 1; }

          # Builtin tier is CA-rooted (no CT/Rekor) → ignore SCT + tlog; trust is the cert chain to
          # our CA + the bound build identity + the DSSE signature. (External tier drops both flags.)
          verify() {
            ./cosign verify-blob-attestation --bundle "$1" --new-bundle-format \
              --trusted-root trustedroot.json --insecure-ignore-sct --insecure-ignore-tlog \
              --type slsaprovenance \
              --certificate-identity "$2" --certificate-oidc-issuer "$base" artifact.txt
          }

          echo "=== VERIFY real bundle (must PASS) ==="
          verify out.bundle "$identity"; good=$?; echo "verify(good) rc=$good"

          echo "=== ADVERSARIAL 1: tampered DSSE payload (must FAIL) ==="
          jq '.dsseEnvelope.payload = "dGFtcGVyZWQ="' out.bundle > tampered.bundle
          verify tampered.bundle "$identity"; tamper=$?; echo "verify(tampered) rc=$tamper"

          echo "=== ADVERSARIAL 2: wrong identity (must FAIL) ==="
          verify out.bundle "$base/evil/repo"; wrongid=$?; echo "verify(wrong-identity) rc=$wrongid"

          echo "=== ADVERSARIAL 3: PoP — ask Fulcio to cert a key we don't control (must be 400) ==="
          openssl ecparam -genkey -name prime256v1 -noout -out evil.pem 2>/dev/null
          evilpub=$(openssl ec -in evil.pem -pubout 2>/dev/null | base64 | tr -d '\n')
          poprc=$(curl -s -o /dev/null -w '%{http_code}' -X POST "$base/api/v1/signingCert" \
            -H "Authorization: Bearer $tok" -H "Content-Type: application/json" \
            -d "{\"publicKey\":{\"content\":\"$evilpub\"},\"signedEmailAddress\":\"AAAA\"}")
          echo "fulcio(bad-PoP) http=$poprc (want 400)"

          echo "=== RESULT good=$good(0) tamper=$tamper(!0) wrongid=$wrongid(!0) badPoP=$poprc(400) ==="
          if [ "$good" = "0" ] && [ "$tamper" != "0" ] && [ "$wrongid" != "0" ] && [ "$poprc" = "400" ]; then
            echo "HARDENED-OK: PoP-bound cert, real verifies; tampered/wrong-identity/forged-key rejected"; exit 0
          else
            echo "HARDENED-FAIL"; exit 1
          fi
