name: commit_status

on: push

# Posting a commit status requires an explicit `statuses: write` grant — the default token is read-only.
# Byte-for-byte: Brokkr enforces the SAME permission model, so the workflow declares it and the call
# succeeds on both GitHub and Brokkr (and must be denied on both without it).
permissions:
  statuses: write

jobs:
  status:
    runs-on: ubuntu-latest
    steps:
      - name: Post a commit status to the SCM
        run: |
          curl -fsS -X POST "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"state":"success","context":"brokkr/conformance","description":"via the REST proxy"}'
      - name: Read it back from the SCM
        run: |
          curl -fsS "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/commits/$GITHUB_SHA/statuses" \
            -H "Authorization: token $GITHUB_TOKEN"
