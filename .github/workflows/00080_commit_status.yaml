name: commit_status

on: push

jobs:
  status:
    runs-on: ubuntu-latest
    steps:
      - name: Post a commit status to the SCM
        run: |
          curl -fsS -X POST "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"state":"success","context":"brokkr/conformance","description":"via the REST proxy"}'
      - name: Read it back from the SCM
        run: |
          curl -fsS "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/commits/$GITHUB_SHA/statuses" \
            -H "Authorization: token $GITHUB_TOKEN"
