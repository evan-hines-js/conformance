name: expr-format

on: push

jobs:
  job:
    runs-on: ubuntu-latest
    steps:
      - name: Build a tag
        run: |
          echo "image=${{ format('{0}/{1}:{2}', github.repository_owner, 'app', github.run_number) }}"
      - name: Reorder args
        run: |
          echo "order=${{ format('{2}-{1}-{0}', 'a', 'b', 'c') }}"
      - name: Escaped braces
        run: |
          echo "literal=${{ format('a{{b}}c') }}"
