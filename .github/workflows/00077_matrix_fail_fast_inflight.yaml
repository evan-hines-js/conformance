name: matrix-fail-fast-inflight

on: push

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        variant: [slow, boom]
    steps:
      - name: Run
        run: |
          if [ "${{ matrix.variant }}" = "boom" ]; then
            sleep 3
            echo "boom failing"
            exit 1
          fi
          echo "slow started"
          sleep 60
          echo "should-not-finish"
